name: Deploy Site

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

on:
  push:
    branches:
      - deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Commit Environment Variables
        working-directory: ${{ github.workspace }}/
        run: |
          echo "COMMIT_AUTHOR_NAME=$( git log --format=%an -n 1 $GITHUB_SHA )" >> $GITHUB_ENV
          echo "COMMIT_AUTHOR_EMAIL=$( git log --format=%ae -n 1 $GITHUB_SHA )" >> $GITHUB_ENV
          echo "COMMIT_COMMITTER_NAME=$( git log --format=%cn -n 1 $GITHUB_SHA )" >> $GITHUB_ENV
          echo "COMMIT_COMMITTER_EMAIL=$( git log --format=%ce -n 1 $GITHUB_SHA )" >> $GITHUB_ENV
          echo "COMMIT_MESSAGE<<EOV" >> $GITHUB_ENV
          echo "$( git log --format=%B -n 1 $GITHUB_SHA )" >> $GITHUB_ENV
          echo "EOV" >> $GITHUB_ENV
          echo "COMMIT_DATETIME=$( git log --format=%cI -n 1 $GITHUB_SHA )" >> $GITHUB_ENV
          echo "COMMIT_TIMESTAMP=$( git log --format=%ct -n 1 $GITHUB_SHA )" >> $GITHUB_ENV
          TIMESTAMP_UTC=`date +%s`
          echo "TIMESTAMP_UTC=$TIMESTAMP_UTC" >> $GITHUB_ENV
          echo "RELEASE=${GITHUB_SHA:0:7}.$TIMESTAMP_UTC" >> $GITHUB_ENV

      - name: Save ENV Vars for to .deploy.txt
        run: |
          echo "CI='${CI}'
          GITHUB_ACTION='${GITHUB_ACTION}'
          GITHUB_ACTION_PATH='${GITHUB_ACTION_PATH}'
          GITHUB_ACTION_REPOSITORY='${GITHUB_ACTION_REPOSITORY}'
          GITHUB_ACTIONS='${GITHUB_ACTIONS}'
          GITHUB_ACTOR='${GITHUB_ACTOR}'
          GITHUB_API_URL='${GITHUB_API_URL}'
          GITHUB_BASE_REF='${GITHUB_BASE_REF}'
          GITHUB_ENV='${GITHUB_ENV}'
          GITHUB_EVENT_NAME='${GITHUB_EVENT_NAME}'
          GITHUB_EVENT_PATH='${GITHUB_EVENT_PATH}'
          GITHUB_GRAPHQL_URL='${GITHUB_GRAPHQL_URL}'
          GITHUB_HEAD_REF='${GITHUB_HEAD_REF}'
          GITHUB_JOB='${GITHUB_JOB}'
          GITHUB_PATH='${GITHUB_PATH}'
          GITHUB_REF='${GITHUB_REF}'
          GITHUB_REF_NAME='${GITHUB_REF_NAME}'
          GITHUB_REF_PROTECTED='${GITHUB_REF_PROTECTED}'
          GITHUB_REF_TYPE='${GITHUB_REF_TYPE}'
          GITHUB_REPOSITORY='${GITHUB_REPOSITORY}'
          GITHUB_REPOSITORY_OWNER='${GITHUB_REPOSITORY_OWNER}'
          GITHUB_RETENTION_DAYS='${GITHUB_RETENTION_DAYS}'
          GITHUB_RUN_ATTEMPT='${GITHUB_RUN_ATTEMPT}'
          GITHUB_RUN_ID='${GITHUB_RUN_ID}'
          GITHUB_RUN_NUMBER='${GITHUB_RUN_NUMBER}'
          GITHUB_SERVER_URL='${GITHUB_SERVER_URL}'
          GITHUB_SHA='${GITHUB_SHA}'
          GITHUB_WORKFLOW='${GITHUB_WORKFLOW}'
          GITHUB_WORKSPACE='${GITHUB_WORKSPACE}'
          RUNNER_ARCH='${RUNNER_ARCH}'
          RUNNER_NAME='${RUNNER_NAME}'
          RUNNER_OS='${RUNNER_OS}'
          RUNNER_TEMP='${RUNNER_TEMP}'
          RUNNER_TOOL_CACHE='${RUNNER_TOOL_CACHE}'
          COMMIT_AUTHOR_NAME='${COMMIT_AUTHOR_NAME}'
          COMMIT_AUTHOR_EMAIL='${COMMIT_AUTHOR_EMAIL}'
          COMMIT_COMMITTER_NAME='${COMMIT_COMMITTER_NAME}'
          COMMIT_COMMITTER_EMAIL='${COMMIT_COMMITTER_EMAIL}'
          COMMIT_MESSAGE='${COMMIT_MESSAGE}'
          COMMIT_DATETIME='${COMMIT_DATETIME}'
          COMMIT_TIMESTAMP='${COMMIT_TIMESTAMP}'
          TIMESTAMP_UTC='${TIMESTAMP_UTC}'
          RELEASE='${RELEASE}'
          DEV_DEPLOY_HOST='${{ secrets.DEV_DEPLOY_HOST }}'
          NODE_VERSION='${NODE_VERSION}'
          SITE_FOLDER='${SITE_FOLDER}'
          ALT_FOLDER='${ALT_FOLDER}'
          THEME_FOLDER1='${THEME_FOLDER1}'
          THEME_FOLDER2='${THEME_FOLDER2}'
          APP_FOLDER='${APP_FOLDER}'" >> .deploy.txt

      - name: rsync
        shell: bash
        run: |
          echo 'RSYNC'
          set -eu
          mkdir -p ~/.ssh
          ssh-keyscan -t rsa ${{ secrets.DEV_DEPLOY_HOST }} > ~/.ssh/known_hosts
          echo "${{ secrets.DEV_DEPLOY_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          rsync -avzP -e 'ssh -p ${{ secrets.DEV_DEPLOY_HOST_PORT }}' '${{ github.workspace }}/' jjpmann@${{ secrets.DEV_DEPLOY_HOST }}:/var/www/kingskyler.jjpmann.com/public/ --dry-run 
          echo 'RSYNC COMPLETE'

